      name: "&c&l✕ Close"
      lore:
        - ""
        - "&7Click to close the pouch"
        - "&aItems are saved automatically!"
    locked-slot:
      material: GRAY_STAINED_GLASS_PANE
      name: "&8&l🔒 Locked"
      lore:
        - ""
        - "&7Upgrade your pouch to"
        - "&7unlock this slot!"
