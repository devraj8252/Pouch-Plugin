        - ""
        - "&a✔ Active — Death Protection ON"
        - ""
        - "&7Your pouch items will be"
        - "&7preserved if you die."
        - ""
        - "&e⚠ Consumed on death!"
        - ""
        - "&c▸ Click to remove"
    locker-inactive:
      material: RED_STAINED_GLASS_PANE
      name: "&c&l🔒 No Soul Locker"
      lore:
        - ""
        - "&4✘ Unprotected"
        - ""
