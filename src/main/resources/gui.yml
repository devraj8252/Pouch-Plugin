# ============================================
#          GUI Configuration
# ============================================

gui:
  title: "  ✦ &d&lPS-Magic Pouch &r✦ │ &l%tier_name%"
  items:
    locker-active:
      material: HEART_OF_THE_SEA
      name: "&b&l⚡ Soul Locker ⚡"
