# ============================================
#          PS-Magic Pouch Configuration
# ============================================
# Main settings file. Tiers, GUI, and Messages 
# are now in their own separate files for organization.

# Global Feature Toggles
features:
  soul-locker: true       # Enable/Disable the death protection system
  upgrades: true          # Enable/Disable the tier upgrade system
  crafting: true          # Global toggle for custom recipes
  always-keep-items: false # If true, pouch items never drop on death

# Sound effects
sounds:
  open-pouch: BLOCK_ENDER_CHEST_OPEN
  close-pouch: BLOCK_ENDER_CHEST_CLOSE
  upgrade: ENTITY_PLAYER_LEVELUP
  equip-locker: BLOCK_BEACON_ACTIVATE
  remove-locker: BLOCK_BEACON_DEACTIVATE
  death-protected: ITEM_TOTEM_USE
  error: ENTITY_VILLAGER_NO
