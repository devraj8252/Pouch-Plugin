name: PS-Magic Pouch
version: '${version}'
main: com.parrotservices.PSMagicPouch
api-version: '1.21'
description: A magical upgradeable pouch for extra portable storage with death protection
author: Parrot Services
commands:
  pouch:
    description: Main command for PS-Magic Pouch
    usage: /pouch [admin|reload]
    aliases: [p, magicpouch]

permissions:
  magicpouch.admin:
    description: Allows access to admin commands (reload, give)
    default: op
